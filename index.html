<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Entregas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; }
    .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    .input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; }
    .input:focus { border-color: #00f0ff; outline: none; box-shadow: 0 0 15px rgba(0,240,255,0.3); }
    .btn-primary { background: linear-gradient(135deg, #00f0ff 0%, #0099cc 100%); transition: all 0.3s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,240,255,0.4); }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .animate-float { animation: float 3s ease-in-out infinite; }
  </style>
</head>
<body class="p-4">
  <div class="max-w-md mx-auto">
    <!-- Header -->
    <div class="text-center mb-8 pt-8">
      <div class="text-6xl mb-4 animate-float">📦</div>
      <h1 class="text-3xl font-black text-white">REGISTRO DE</h1>
      <h1 class="text-3xl font-black text-cyan-400">ENTREGAS</h1>
    </div>

    <!-- Info Card -->
    <div class="card rounded-2xl p-6 mb-6">
      <h2 class="text-lg font-bold text-white mb-4">📋 Nueva Entrega</h2>
      <p class="text-gray-400 text-sm mb-6">Completá los datos del delivery</p>
      
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSd_c6vvIti_iHEpnx8mqIRgjFTUIoCoR8gPIed6tOHzMbXIbg/viewform" 
         class="btn-primary block w-full py-4 text-center text-black font-bold rounded-xl">
        COMPLETAR FORMULARIO →
      </a>
    </div>

    <!-- Features -->
    <div class="grid grid-cols-2 gap-4 mb-8">
      <div class="card rounded-xl p-4 text-center">
        <div class="text-2xl mb-1">✅</div>
        <div class="text-xs text-gray-400">Datos en</div>
        <div class="text-sm font-bold text-white">Google Sheets</div>
      </div>
      <div class="card rounded-xl p-4 text-center">
        <div class="text-2xl mb-1">⚡</div>
        <div class="text-xs text-gray-400">Registro</div>
        <div class="text-sm font-bold text-white">Rápido</div>
      </div>
    </div>

    <!-- Help -->
    <div class="text-center text-gray-500 text-xs">
      <p>💡 Los datos se guardan automáticamente</p>
    </div>
  </div>
</body>
</html>
