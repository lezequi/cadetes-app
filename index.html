<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Entregas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); margin: 0; padding: 0; }
    .header { text-align: center; padding: 20px; }
    .logo { font-size: 60px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    iframe { width: 100%; height: 90vh; border: none; }
    .note { text-align: center; padding: 10px; color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">📦</div>
    <h1 style="color:white;font-weight:900;margin:0;">REGISTRO DE</h1>
    <h1 style="color:#00f0ff;font-weight:900;margin:0;">ENTREGAS</h1>
  </div>
  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd_c6vvIti_iHEpnx8mqIRgjFTUIoCoR8gPIed6tOHzMbXIbg/viewform?embedded=true"></iframe>
  <div class="note">
    💡 Los datos se guardan automáticamente en Google Sheets
  </div>
</body>
</html>
