<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Entregas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; }
    .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    .input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; }
    .input:focus { border-color: #00f0ff; outline: none; box-shadow: 0 0 10px rgba(0,240,255,0.3); }
  </style>
</head>
<body class="p-4">
  <div class="max-w-md mx-auto">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">📦</div>
      <h1 class="text-2xl font-bold text-white">Registro de Entregas</h1>
    </div>

    <form id="form" class="card rounded-2xl p-6 space-y-4">
      <div>
        <label class="block text-sm text-gray-300 mb-2">Nombre del Cadete *</label>
        <input type="text" id="cadete" required class="input w-full px-4 py-3 rounded-lg" placeholder="Tu nombre">
      </div>
      <div>
        <label class="block text-sm text-gray-300 mb-2">Nombre del Afiliado *</label>
        <input type="text" id="afiliado" required class="input w-full px-4 py-3 rounded-lg" placeholder="Nombre del afiliado">
      </div>
      <div>
        <label class="block text-sm text-gray-300 mb-2">Número de Remito *</label>
        <input type="text" id="remito" required class="input w-full px-4 py-3 rounded-lg" placeholder="Ej: REM-001234">
      </div>
      <div>
        <label class="block text-sm text-gray-300 mb-2">Número de Factura</label>
        <input type="text" id="factura" class="input w-full px-4 py-3 rounded-lg" placeholder="Ej: FAC-5678">
      </div>
      <button type="submit" class="w-full py-4 bg-gradient-to-r from-blue-500 to-cyan-500 text-white font-bold rounded-lg">
        REGISTRAR ENTREGA
      </button>
    </form>

    <div id="success" class="hidden card rounded-2xl p-8 text-center mt-6">
      <div class="text-6xl mb-4">✅</div>
      <h2 class="text-2xl font-bold text-white mb-2">¡Registrado!</h2>
      <p class="text-gray-400 mb-4" id="dataDisplay"></p>
      <button onclick="resetForm()" class="px-6 py-3 border border-white/20 rounded-lg text-white">Nueva entrega</button>
    </div>
    
    <div class="mt-8 text-center text-gray-500 text-xs">
      <p>💡 Para conectar con Google Sheets, hacer desde PC</p>
    </div>
  </div>

  <script>
    document.getElementById('form').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const data = {
        cadete: document.getElementById('cadete').value,
        afiliado: document.getElementById('afiliado').value,
        remito: document.getElementById('remito').value,
        factura: document.getElementById('factura').value,
        fecha: new Date().toLocaleString('es-AR')
      };

      // Mostrar datos registrados
      document.getElementById('dataDisplay').innerHTML = 
        `<strong>Cadete:</strong> ${data.cadete}<br>` +
        `<strong>Afiliado:</strong> ${data.afiliado}<br>` +
        `<strong>Remito:</strong> ${data.remito}<br>` +
        `<strong>Fecha:</strong> ${data.fecha}`;
      
      document.getElementById('form').classList.add('hidden');
      document.getElementById('success').classList.remove('hidden');
      
      // Guardar en localStorage
      let registros = JSON.parse(localStorage.getItem('entregas') || '[]');
      registros.push(data);
      localStorage.setItem('entregas', JSON.stringify(registros));
    });

    function resetForm() {
      document.getElementById('form').reset();
      document.getElementById('form').classList.remove('hidden');
      document.getElementById('success').classList.add('hidden');
    }
  </script>
</body>
</html>
