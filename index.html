<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadetes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1eb;
      --surface: #fbfaf7;
      --text: #1f1f1c;
      --muted: #6f6a63;
      --line: #d7d1c7;
      --accent: #1d6d50;
      --danger: #9e3d35;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Manrope", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(100%, 420px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .brand img {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      object-fit: cover;
    }

    .brand p {
      margin: 0;
      font-size: 0.85rem;
      color: var(--muted);
    }

    h1 {
      margin: 2px 0 0;
      font-size: 1.55rem;
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    form {
      display: grid;
      gap: 12px;
    }

    input,
    button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      font: inherit;
    }

    input {
      padding: 16px;
      background: var(--surface);
      color: var(--text);
    }

    input[type="file"] {
      padding: 12px;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    button {
      padding: 16px;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .meta,
    .message {
      margin-top: 14px;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--muted);
    }

    .message.error {
      color: var(--danger);
    }

    .message.success {
      color: var(--accent);
    }

    .success {
      display: none;
      padding: 18px 0 0;
    }

    .success.visible {
      display: block;
    }

    .success strong {
      display: block;
      margin-bottom: 6px;
      font-size: 1rem;
    }

    .setup {
      display: none;
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .setup.visible {
      display: block;
    }
  </style>
</head>
<body>
  <main>
    <section class="app">
      <div class="brand">
        <img src="logo.jpg" alt="Logo de la farmacia">
        <div>
          <p id="pharmacy-name">Farmacia</p>
          <h1>Registrar entrega</h1>
        </div>
      </div>

      <form id="delivery-form" novalidate>
        <input id="cadete" name="cadete" type="text" placeholder="Cadete" required>
        <input id="afiliado" name="afiliado" type="text" placeholder="Afiliado" required>
        <input id="remito" name="remito" type="text" placeholder="Remito" required>
        <input id="factura" name="factura" type="text" placeholder="Factura (opcional)">
        <input id="foto" name="foto" type="file" accept="image/*" capture="environment" required>
        <button id="submit-button" type="submit">Guardar</button>
      </form>

      <p class="meta" id="meta"></p>
      <p class="message" id="message" role="status" aria-live="polite"></p>

      <div class="success" id="success">
        <strong>Entrega guardada.</strong>
        <span id="success-detail"></span>
      </div>

      <div class="setup" id="setup">
        La app ya esta lista para Vercel. Falta cargar las variables del cliente para Google Sheets y Drive.
      </div>
    </section>
  </main>

  <script>
    (function () {
      const form = document.getElementById("delivery-form");
      const submitButton = document.getElementById("submit-button");
      const message = document.getElementById("message");
      const success = document.getElementById("success");
      const successDetail = document.getElementById("success-detail");
      const meta = document.getElementById("meta");
      const setup = document.getElementById("setup");

      function nowText() {
        return new Intl.DateTimeFormat("es-AR", {
          dateStyle: "medium",
          timeStyle: "short"
        }).format(new Date());
      }

      function setMessage(text, tone) {
        message.textContent = text;
        message.className = "message";
        if (tone) {
          message.classList.add(tone);
        }
      }

      function resetSuccess() {
        success.classList.remove("visible");
        successDetail.textContent = "";
      }

      async function loadConfig() {
        try {
          const response = await fetch("/api/config");
          if (!response.ok) {
            return;
          }

          const data = await response.json();
          if (data.pharmacyName) {
            document.getElementById("pharmacy-name").textContent = data.pharmacyName;
          }
          if (!data.configured) {
            setup.classList.add("visible");
            submitButton.disabled = true;
            setMessage("Falta configurar Google Drive y Google Sheets en Vercel.", "error");
          }
        } catch (error) {
          setMessage("La app esta online, pero todavia no pudo leer la configuracion.", "error");
        }
      }

      form.addEventListener("submit", async function (event) {
        event.preventDefault();
        resetSuccess();

        if (!form.reportValidity()) {
          setMessage("Completa los campos obligatorios.", "error");
          return;
        }

        const payload = new FormData(form);
        payload.set("submittedAt", new Date().toISOString());

        submitButton.disabled = true;
        setMessage("Guardando...", "");

        try {
          const response = await fetch("/api/submit", {
            method: "POST",
            body: payload
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "No se pudo guardar.");
          }

          success.classList.add("visible");
          successDetail.textContent =
            data.remito + (data.photoUrl ? " - foto subida" : "");
          setMessage("Envio completado.", "success");
          form.reset();
        } catch (error) {
          setMessage(error.message || "No se pudo guardar.", "error");
        } finally {
          submitButton.disabled = false;
        }
      });

      meta.textContent = "Actualizado " + nowText();
      window.setInterval(function () {
        meta.textContent = "Actualizado " + nowText();
      }, 30000);

      loadConfig();
    })();
  </script>
</body>
</html>
