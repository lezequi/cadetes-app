<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadetes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ee;
      --surface: #fffdf8;
      --surface-soft: #f8f5ee;
      --text: #171915;
      --muted: #747067;
      --line: #ddd6ca;
      --accent: #087b3d;
      --accent-dark: #066431;
      --danger: #a13c34;
      --shadow: 0 24px 70px rgba(42, 38, 30, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Manrope", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(8, 123, 61, 0.12), transparent 30rem),
        linear-gradient(145deg, #fbfaf6 0%, var(--bg) 54%, #eee8dd 100%);
      color: var(--text);
    }

    main {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 34px);
    }

    .app {
      width: min(100%, 420px);
      padding: clamp(22px, 5vw, 34px);
      border: 1px solid rgba(82, 74, 61, 0.14);
      border-radius: 30px;
      background: rgba(255, 253, 248, 0.88);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      animation: rise 420ms ease-out both;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .brand img {
      width: 72px;
      height: 72px;
      padding: 6px;
      border-radius: 22px;
      background: #ffffff;
      object-fit: contain;
      box-shadow: 0 12px 32px rgba(8, 123, 61, 0.12);
    }

    .brand p {
      margin: 0;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 2px 0 0;
      font-size: clamp(1.65rem, 6vw, 2rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    form {
      display: grid;
      gap: 12px;
    }

    input,
    button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      font: inherit;
    }

    input {
      min-height: 54px;
      padding: 15px 16px;
      background: var(--surface);
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    input::placeholder {
      color: #8a8479;
    }

    input[type="file"] {
      min-height: auto;
      padding: 10px;
      background: var(--surface-soft);
      cursor: pointer;
    }

    input[type="file"]::file-selector-button {
      margin-right: 12px;
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      background: #e8f3eb;
      color: var(--accent-dark);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .field-label {
      margin: 4px 0 -5px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(8, 123, 61, 0.12);
    }

    button {
      min-height: 56px;
      padding: 16px;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(8, 123, 61, 0.22);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    button:hover:not(:disabled) {
      background: var(--accent-dark);
      box-shadow: 0 18px 36px rgba(8, 123, 61, 0.26);
      transform: translateY(-1px);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }

    .meta,
    .message {
      margin-top: 14px;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--muted);
    }

    .message.error {
      color: var(--danger);
    }

    .message.success {
      color: var(--accent);
    }

    .success {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      border: 1px solid rgba(8, 123, 61, 0.18);
      border-radius: 18px;
      background: #eef8f0;
    }

    .success.visible {
      display: block;
    }

    .success strong {
      display: block;
      margin-bottom: 6px;
      font-size: 1rem;
    }

    .file-note {
      margin: -4px 0 2px;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .hidden-frame {
      width: 0;
      height: 0;
      border: 0;
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 420px) {
      .app {
        border-radius: 24px;
      }

      .brand {
        gap: 12px;
      }

      .brand img {
        width: 64px;
        height: 64px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="app">
      <div class="brand">
        <img src="logo.jpg" alt="Logo de la farmacia">
        <div>
          <p>Registrar entrega</p>
          <h1>Cadetes</h1>
        </div>
      </div>

      <form
        id="delivery-form"
        method="POST"
        target="submit-target"
        novalidate
      >
        <input id="cadete" name="cadete" type="text" placeholder="Cadete" required>
        <input id="afiliado" name="afiliado" type="text" placeholder="Afiliado" required>
        <input id="remito" name="remito" type="text" placeholder="Remito" required>
        <input id="factura" name="factura" type="text" placeholder="Factura (opcional)">
        <label class="field-label" for="fecha-hora-comprobante">Fecha y hora del comprobante</label>
        <input
          id="fecha-hora-comprobante"
          name="fechaHoraComprobante"
          type="datetime-local"
          aria-label="Fecha y hora del comprobante"
          required
        >
        <label class="field-label" for="foto">Comprobante</label>
        <input id="foto" name="foto" type="file" accept=".jpg,.jpeg,.pdf,image/jpeg,application/pdf" required>
        <p class="file-note">JPG o PDF liviano. Si la foto pesa mucho, acercate mas y repetila.</p>
        <input id="submitted-at" name="submittedAt" type="hidden">
        <input id="photo-base64" name="photoBase64" type="hidden">
        <input id="photo-name" name="photoName" type="hidden">
        <input id="photo-type" name="photoType" type="hidden">
        <button id="submit-button" type="submit">Guardar entrega</button>
      </form>

      <p class="meta" id="meta"></p>
      <p class="message" id="message" role="status" aria-live="polite"></p>

      <div class="success" id="success">
        <strong>Entrega guardada.</strong>
        <span id="success-detail"></span>
      </div>
    </section>
  </main>

  <iframe class="hidden-frame" id="submit-target" name="submit-target" title="Envio oculto"></iframe>

  <script>
    (function () {
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzHL0bqhRWDUEeb3yRp3SBPkBcvEJzBDgc-hVpT3K4qQ6nEegfMmV1L8Guq5EX98aq1dw/exec";

      const form = document.getElementById("delivery-form");
      const target = document.getElementById("submit-target");
      const submitButton = document.getElementById("submit-button");
      const submittedAt = document.getElementById("submitted-at");
      const voucherDateTime = document.getElementById("fecha-hora-comprobante");
      const photoBase64 = document.getElementById("photo-base64");
      const photoName = document.getElementById("photo-name");
      const photoType = document.getElementById("photo-type");
      const message = document.getElementById("message");
      const success = document.getElementById("success");
      const successDetail = document.getElementById("success-detail");
      const meta = document.getElementById("meta");

      let pending = false;
      let confirmationTimer = null;

      function nowText() {
        return new Intl.DateTimeFormat("es-AR", {
          dateStyle: "medium",
          timeStyle: "short"
        }).format(new Date());
      }

      function setMessage(text, tone) {
        message.textContent = text;
        message.className = "message";
        if (tone) {
          message.classList.add(tone);
        }
      }

      function resetSuccess() {
        success.classList.remove("visible");
        successDetail.textContent = "";
      }

      function dateTimeLocalNow() {
        const date = new Date();
        date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
        return date.toISOString().slice(0, 16);
      }

      function clearPendingState() {
        pending = false;
        window.clearTimeout(confirmationTimer);
        confirmationTimer = null;
        submitButton.disabled = false;
      }

      function readFileAsDataUrl(file) {
        return new Promise(function (resolve, reject) {
          const reader = new FileReader();
          reader.onload = function () {
            resolve(String(reader.result || ""));
          };
          reader.onerror = function () {
            reject(new Error("No se pudo leer la foto."));
          };
          reader.readAsDataURL(file);
        });
      }

      function validatePhotoFile(file) {
        const lowerName = file.name.toLowerCase();
        const isJpg = file.type === "image/jpeg" || lowerName.endsWith(".jpg") || lowerName.endsWith(".jpeg");
        const isPdf = file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf");

        if (!isJpg && !isPdf) {
          throw new Error("El comprobante tiene que ser JPG o PDF.");
        }

        if (file.size > 15 * 1024 * 1024) {
          throw new Error("El archivo es demasiado pesado. Proba con uno mas liviano.");
        }
      }

      function loadImage(dataUrl) {
        return new Promise(function (resolve, reject) {
          const image = new Image();
          image.onload = function () {
            resolve(image);
          };
          image.onerror = function () {
            reject(new Error("No se pudo procesar la foto."));
          };
          image.src = dataUrl;
        });
      }

      async function buildCompressedPhoto(file) {
        const originalDataUrl = await readFileAsDataUrl(file);
        const image = await loadImage(originalDataUrl);
        const maxSide = 900;
        const scale = Math.min(1, maxSide / Math.max(image.width, image.height));
        const width = Math.max(1, Math.round(image.width * scale));
        const height = Math.max(1, Math.round(image.height * scale));
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        canvas.width = width;
        canvas.height = height;
        context.drawImage(image, 0, 0, width, height);

        const jpegDataUrl = canvas.toDataURL("image/jpeg", 0.45);
        const encoded = jpegDataUrl.split(",")[1] || "";

        if (encoded.length > 700000) {
          throw new Error("La foto sigue siendo muy pesada. Acercate mas o usa una imagen mas liviana.");
        }

        return {
          base64: encoded,
          name: (file.name || "foto").replace(/\.[^.]+$/, "") + ".jpg",
          type: "image/jpeg"
        };
      }

      async function buildUploadPayload(file) {
        const isPdf = file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf");

        if (isPdf) {
          const dataUrl = await readFileAsDataUrl(file);
          const encoded = dataUrl.split(",")[1] || "";

          if (encoded.length > 1200000) {
            throw new Error("El PDF es demasiado pesado. Exportalo mas liviano.");
          }

          return {
            base64: encoded,
            name: file.name || "comprobante.pdf",
            type: "application/pdf"
          };
        }

        return buildCompressedPhoto(file);
      }

      window.addEventListener("message", function (event) {
        const data = event.data || {};
        if (!pending || data.type !== "cadetes-submission") {
          return;
        }

        if (data.ok) {
          success.classList.add("visible");
          successDetail.textContent =
            document.getElementById("cadete").value.trim() + " - " +
            document.getElementById("remito").value.trim();
          setMessage("Envio completado.", "success");
          form.reset();
          voucherDateTime.value = dateTimeLocalNow();
        } else if (data.saved) {
          setMessage("La fila se guardo, pero fallo el comprobante: " + (data.error || "revisar Drive"), "error");
        } else {
          setMessage(data.error || "No se pudo guardar la entrega.", "error");
        }

        clearPendingState();
      });

      form.addEventListener("submit", async function (event) {
        resetSuccess();

        if (!form.reportValidity()) {
          event.preventDefault();
          setMessage("Completa los campos obligatorios.", "error");
          return;
        }

        const photoFile = document.getElementById("foto").files[0];
        if (!photoFile) {
          event.preventDefault();
          setMessage("Falta la foto.", "error");
          return;
        }

        event.preventDefault();
        submitButton.disabled = true;
        setMessage("Preparando foto...", "");

        try {
          validatePhotoFile(photoFile);
          const uploadPayload = await buildUploadPayload(photoFile);

          photoBase64.value = uploadPayload.base64;
          photoName.value = uploadPayload.name;
          photoType.value = uploadPayload.type;

          pending = true;
          submittedAt.value = new Date().toISOString();
          form.action = SCRIPT_URL;
          setMessage("Guardando...", "");
          form.submit();

          confirmationTimer = window.setTimeout(function () {
            if (!pending) {
              return;
            }

            clearPendingState();
            setMessage("No pude confirmar el guardado. Revisa la planilla antes de volver a cargar.", "error");
          }, 25000);
        } catch (error) {
          submitButton.disabled = false;
          setMessage(error.message || "No se pudo preparar la foto.", "error");
        }
      });

      voucherDateTime.value = dateTimeLocalNow();
      meta.textContent = "Actualizado " + nowText();
      window.setInterval(function () {
        meta.textContent = "Actualizado " + nowText();
      }, 30000);
    })();
  </script>
</body>
</html>
