<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadetes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1eb;
      --surface: #fbfaf7;
      --text: #1f1f1c;
      --muted: #6f6a63;
      --line: #d7d1c7;
      --accent: #1d6d50;
      --danger: #9e3d35;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Manrope", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(100%, 420px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .brand img {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      object-fit: cover;
    }

    .brand p {
      margin: 0;
      font-size: 0.85rem;
      color: var(--muted);
    }

    h1 {
      margin: 2px 0 0;
      font-size: 1.55rem;
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    form {
      display: grid;
      gap: 12px;
    }

    input,
    button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      font: inherit;
    }

    input {
      padding: 16px;
      background: var(--surface);
      color: var(--text);
    }

    input[type="file"] {
      padding: 12px;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    button {
      padding: 16px;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .meta,
    .message {
      margin-top: 14px;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--muted);
    }

    .message.error {
      color: var(--danger);
    }

    .message.success {
      color: var(--accent);
    }

    .success {
      display: none;
      padding: 18px 0 0;
    }

    .success.visible {
      display: block;
    }

    .success strong {
      display: block;
      margin-bottom: 6px;
      font-size: 1rem;
    }

    .hidden-frame {
      width: 0;
      height: 0;
      border: 0;
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main>
    <section class="app">
      <div class="brand">
        <img src="logo.jpg" alt="Logo de la farmacia">
        <div>
          <p>Farmacia</p>
          <h1>Registrar entrega</h1>
        </div>
      </div>

      <form
        id="delivery-form"
        method="POST"
        target="submit-target"
        novalidate
      >
        <input id="cadete" name="cadete" type="text" placeholder="Cadete" required>
        <input id="afiliado" name="afiliado" type="text" placeholder="Afiliado" required>
        <input id="remito" name="remito" type="text" placeholder="Remito" required>
        <input id="factura" name="factura" type="text" placeholder="Factura (opcional)">
        <input id="foto" name="foto" type="file" accept="image/*" capture="environment" required>
        <input id="submitted-at" name="submittedAt" type="hidden">
        <input id="photo-base64" name="photoBase64" type="hidden">
        <input id="photo-name" name="photoName" type="hidden">
        <input id="photo-type" name="photoType" type="hidden">
        <button id="submit-button" type="submit">Guardar</button>
      </form>

      <p class="meta" id="meta"></p>
      <p class="message" id="message" role="status" aria-live="polite"></p>

      <div class="success" id="success">
        <strong>Entrega guardada.</strong>
        <span id="success-detail"></span>
      </div>
    </section>
  </main>

  <iframe class="hidden-frame" id="submit-target" name="submit-target" title="Envio oculto"></iframe>

  <script>
    (function () {
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwkmCBEZK5GbpoHY3deNNdQ1MxKxwInYMgyIyLyH_jcL7iSH4oNN-ralg9fhLEux3avDw/exec";

      const form = document.getElementById("delivery-form");
      const target = document.getElementById("submit-target");
      const submitButton = document.getElementById("submit-button");
      const submittedAt = document.getElementById("submitted-at");
      const photoBase64 = document.getElementById("photo-base64");
      const photoName = document.getElementById("photo-name");
      const photoType = document.getElementById("photo-type");
      const message = document.getElementById("message");
      const success = document.getElementById("success");
      const successDetail = document.getElementById("success-detail");
      const meta = document.getElementById("meta");

      let pending = false;

      function nowText() {
        return new Intl.DateTimeFormat("es-AR", {
          dateStyle: "medium",
          timeStyle: "short"
        }).format(new Date());
      }

      function setMessage(text, tone) {
        message.textContent = text;
        message.className = "message";
        if (tone) {
          message.classList.add(tone);
        }
      }

      function resetSuccess() {
        success.classList.remove("visible");
        successDetail.textContent = "";
      }

      function readFileAsDataUrl(file) {
        return new Promise(function (resolve, reject) {
          const reader = new FileReader();
          reader.onload = function () {
            resolve(String(reader.result || ""));
          };
          reader.onerror = function () {
            reject(new Error("No se pudo leer la foto."));
          };
          reader.readAsDataURL(file);
        });
      }

      target.addEventListener("load", function () {
        if (!pending) {
          return;
        }

        pending = false;
        submitButton.disabled = false;
        success.classList.add("visible");
        successDetail.textContent =
          document.getElementById("cadete").value.trim() + " - " +
          document.getElementById("remito").value.trim();
        setMessage("Envio completado.", "success");
        form.reset();
      });

      form.addEventListener("submit", async function (event) {
        resetSuccess();

        if (!form.reportValidity()) {
          event.preventDefault();
          setMessage("Completa los campos obligatorios.", "error");
          return;
        }

        const photoFile = document.getElementById("foto").files[0];
        if (!photoFile) {
          event.preventDefault();
          setMessage("Falta la foto.", "error");
          return;
        }

        event.preventDefault();
        submitButton.disabled = true;
        setMessage("Preparando foto...", "");

        try {
          const dataUrl = await readFileAsDataUrl(photoFile);
          const encoded = dataUrl.split(",")[1] || "";

          photoBase64.value = encoded;
          photoName.value = photoFile.name || "foto.jpg";
          photoType.value = photoFile.type || "image/jpeg";

          pending = true;
          submittedAt.value = new Date().toISOString();
          form.action = SCRIPT_URL;
          setMessage("Guardando...", "");
          form.submit();
        } catch (error) {
          submitButton.disabled = false;
          setMessage(error.message || "No se pudo preparar la foto.", "error");
        }
      });

      meta.textContent = "Actualizado " + nowText();
      window.setInterval(function () {
        meta.textContent = "Actualizado " + nowText();
      }, 30000);
    })();
  </script>
</body>
</html>
