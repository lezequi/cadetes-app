<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Entregas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .btn { background: linear-gradient(135deg, #00f0ff, #00cc99); transition: all 0.3s; }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0,240,255,0.4); }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="text-center p-8">
    <div class="text-8xl mb-6 animate-pulse">📦</div>
    <h1 class="text-5xl font-black text-white mb-2">REGISTRO DE</h1>
    <h1 class="text-5xl font-black text-cyan-400 mb-8">ENTREGAS</h1>
    
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSd_c6vvIti_iHEpnx8mqIRgjFTUIoCoR8gPIed6tOHzMbXIbg/viewform" 
       class="btn inline-block px-12 py-6 text-black font-bold text-2xl rounded-2xl text-decoration-none">
      IR AL FORMULARIO →
    </a>
    
    <p class="text-gray-500 mt-8 text-lg">📱 Completá el formulario para registrar entregas</p>
  </div>
</body>
</html>
