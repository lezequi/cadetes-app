<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Entregas - App Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%); min-height: 100vh; }
    .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(0,240,255,0.2); }
    .input { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white; transition: all 0.3s; }
    .input:focus { border-color: #00f0ff; box-shadow: 0 0 20px rgba(0,240,255,0.2); outline: none; }
    .btn-primary { background: linear-gradient(135deg, #00f0ff, #00cc99); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(0,240,255,0.4); }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    .animate-float { animation: float 3s ease-in-out infinite; }
    .glow { text-shadow: 0 0 30px rgba(0,240,255,0.5); }
  </style>
</head>
<body class="p-4">
  <div class="max-w-md mx-auto">
    <div class="text-center mb-8 pt-8">
      <div class="text-7xl mb-4 animate-float">🚀</div>
      <h1 class="text-4xl font-black text-white glow">REGISTRO</h1>
      <h1 class="text-4xl font-black text-cyan-400 glow">PREMIUM</h1>
    </div>

    <form action="https://docs.google.com/forms/d/e/1FAIpQLSd_c6vvIti_iHEpnx8mqIRgjFTUIoCoR8gPIed6tOHzMbXIbg/formResponse" method="POST" target="_blank" class="card rounded-3xl p-8 space-y-6">
      <div>
        <label class="block text-sm text-cyan-300 mb-3 font-medium">Nombre del Cadete</label>
        <input type="text" name="entry.2005620554" required class="input w-full px-5 py-4 rounded-xl text-lg">
      </div>
      
      <div>
        <label class="block text-sm text-cyan-300 mb-3 font-medium">Afiliado</label>
        <input type="text" name="entry.1045781291" required class="input w-full px-5 py-4 rounded-xl text-lg">
      </div>
      
      <div>
        <label class="block text-sm text-cyan-300 mb-3 font-medium">Remito</label>
        <input type="text" name="entry.839337160" required class="input w-full px-5 py-4 rounded-xl text-lg">
      </div>
      
      <button type="submit" class="btn-primary w-full py-5 text-black font-bold rounded-xl text-xl mt-6">
        REGISTRAR ENTREGA
      </button>
      
      <p class="text-center text-gray-500 text-sm">📱 Los datos se guardan en Google Sheets</p>
    </form>
  </div>
</body>
</html>
